specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Jupiter
providerId: jupiter-exchange
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Solana
  - DEX
  - Rate Limiting
description: >-
  Jupiter Lite tier (lite-api.jup.ag) is fair-use, commonly throttled at around 10 requests per
  second per IP. Pro tier (pro-api.jup.ag) keys raise per-second limits per subscription. 429
  is returned when limits are exceeded.
notes: Jupiter does not publish a public per-tier rate-limit table; figures are best-effort.
sources:
  - https://developers.jup.ag/docs
responseCodes:
  throttled: 429
limits:
  - name: Lite (fair use)
    scope: ip
    metric: requests_per_second
    limit: 10
  - name: Pro (typical)
    scope: api_key
    metric: requests_per_second
    limit: 100
    notes: Per-subscription tier.
policies:
  - name: Backoff Strategy
    description: Honor 429 Retry-After and apply exponential backoff with jitter.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
